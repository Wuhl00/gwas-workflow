# =============================================================
# config.yaml
# GWAS Workflow Configuration
# 所有可变参数集中在此文件
# =============================================================

# -------------------------------------------------------------
# 项目基本信息
# -------------------------------------------------------------
project:
  name: gwas_workflow
  outdir: results


# -------------------------------------------------------------
# 临时目录（避免污染系统 /tmp）
# -------------------------------------------------------------
tmpdir: "tmp"

# -------------------------------------------------------------
# 容器
# -------------------------------------------------------------
container: "library://hollandwu84/gwas/gwas_with_tassel:1.0"

# or download and use local path

# -------------------------------------------------------------
# 输入数据
# -------------------------------------------------------------
input:
  vcf: "data/example/mdp.vcf.gz"

phenotype:
  input: "data/example/phenotype.txt"


# -------------------------------------------------------------
# 线程配置
# -------------------------------------------------------------
threads:
  qc: 4
  pca: 4
  kinship: 4
  admixture: 4


# -------------------------------------------------------------
# QC 参数
# -------------------------------------------------------------
qc:
  stage1:
    max_missing: 0.4        # 粗过滤：去除缺失率 > 60% 的位点

  stage2:
    max_missing: 0.8        # 分析级过滤
    maf: 0.05               # 最小等位基因频率


# -------------------------------------------------------------
# Beagle 填充
# -------------------------------------------------------------
beagle:
  memory: 8g
  nthreads: 4
  out_prefix: "data.qc1.impute"
  jar: "/opt/beagle/beagle.27Jan18.7e1.jar"


# -------------------------------------------------------------
# PCA
# -------------------------------------------------------------
pca:
  out_prefix: "pca"
  n_pcs: 5                  # 用于 GWAS 协变量的 PC 数（看 scree_summary.txt 后调整）


# -------------------------------------------------------------
# Kinship（TASSEL Centered_IBS）
# -------------------------------------------------------------
kinship:
  memory: 20g
  method: "Centered_IBS"    # 可选：Centered_IBS / Normalized_IBS
  out_prefix: "kinship"


# -------------------------------------------------------------
# Admixture 群体结构（可开关）
# -------------------------------------------------------------
admixture:
  enabled: false             # false 则完全跳过,true 运行
  k_min: 1
  k_max: 10
  k_best: 7                 # 看 CV.error.txt 后填写
  seed: 42
  ld_window: 50
  ld_step: 10
  ld_threshold: 0.2


# -------------------------------------------------------------
# GWAS 模型（TASSEL）
# -------------------------------------------------------------
gwas:
  models:                   # 注释掉不想跑的模型
    - "GLM"
    - "MLM"
      # - "CMLM"
  memory_min: "1g"
  memory_max: "50g"

